# memo-fish — public 5-float ingest, single-machine, single-attached volume.
#
# DO NOT scale to multiple machines. the volume is single-attached and a second
# writer would split the day's data across machines. fly.toml deliberately omits
# any [http_service.concurrency] or autoscale knob that could spawn a second
# instance; `flyctl scale count` requests must stay at 1.
#
# /metrics binds on the mesh0 overlay (10.66.0.4:9091) and is reachable only
# from prometheus on droplet-us via WG. the public listener (0.0.0.0:8080)
# carries ingest, download, status. /status* is unauthenticated per
# memo-docs/standards/observability.md; /ingest and /download require X-Auth-Key.

app            = "memo-fish"
primary_region = "nrt"

[build]

[env]
  MEMO_ENV              = "prod"
  MEMO_FISH_DATA_DIR    = "/data"
  MEMO_FISH_PUBLIC_BIND = "0.0.0.0:8080"
  MEMO_FISH_METRICS_BIND = "10.66.0.4:9091"
  MEMO_FISH_QUEUE_CAP   = "10000"
  MEMO_FISH_RETENTION_DAYS = "7"
  LOG_LEVEL             = "info"
  RUST_LOG              = "info,memo_fish=info"

[[mounts]]
  source      = "data"
  destination = "/data"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "GET"
    path         = "/status/live"

[[vm]]
  # starting at 512mb to give boringtun + axum + writer buffer headroom on first
  # rollout; once we have two weeks of RSS data we can try shared-cpu-1x@256mb.
  size   = "shared-cpu-1x"
  memory = "512mb"
