# DO NOT scale to multiple machines: volume is single-attached; a second writer
# would split the day's data across machines. keep `fly scale count` at 1.

app            = "memo-fish"
primary_region = "nrt"

[build]

[env]
  MEMO_ENV              = "prod"
  MEMO_FISH_DATA_DIR    = "/data"
  MEMO_FISH_PUBLIC_BIND = "0.0.0.0:8080"
  MEMO_FISH_METRICS_BIND = "10.66.0.4:9091"
  MEMO_FISH_QUEUE_CAP   = "10000"
  MEMO_FISH_RETENTION_DAYS = "7"
  LOG_LEVEL             = "info"
  RUST_LOG              = "info,memo_fish=info"

[[mounts]]
  source      = "data"
  destination = "/data"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "GET"
    path         = "/status/live"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
